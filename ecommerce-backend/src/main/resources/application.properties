spring.application.name=ecommerce-backend

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:cymelle;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true

# Seed data
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.sql.init.platform=h2

# Business config
inventory.low-stock-threshold=10

# Fare engine defaults
fare.base=50.0
fare.per-km-rate=15.0
fare.minimum=80.0
fare.surge-multiplier=1.0

# CORS (allow local React dev server)
cors.allowed-origins=http://localhost:3000

server.port=8080
